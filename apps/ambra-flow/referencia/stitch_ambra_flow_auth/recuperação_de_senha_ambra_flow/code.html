<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recuperação de Senha - Ambra Flow</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2780d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221810",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark font-display overflow-x-hidden antialiased selection:bg-primary/20 selection:text-primary">
<!-- Abstract Background Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[5%] w-[600px] h-[600px] bg-gradient-to-br from-primary/5 to-transparent rounded-full blur-3xl opacity-60"></div>
<div class="absolute bottom-[10%] -left-[5%] w-[500px] h-[500px] bg-gradient-to-tr from-[#8a7460]/10 to-transparent rounded-full blur-3xl opacity-40"></div>
</div>
<div class="layout-container flex h-full grow flex-col z-10 relative">
<div class="flex flex-1 justify-center items-center py-10 px-4 sm:px-6">
<div class="flex flex-col w-full max-w-[440px]">
<!-- Brand Header -->
<div class="flex items-center justify-center gap-3 mb-8">
<div class="size-10 text-primary">
<svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_6_535)">
<path clip-rule="evenodd" d="M47.2426 24L24 47.2426L0.757355 24L24 0.757355L47.2426 24ZM12.2426 21H35.7574L24 9.24264L12.2426 21Z" fill="currentColor" fill-rule="evenodd"></path>
</g>
<defs>
<clippath id="clip0_6_535"><rect fill="white" height="48" width="48"></rect></clippath>
</defs>
</svg>
</div>
<h2 class="text-[#181411] dark:text-white text-xl font-bold leading-tight tracking-[-0.015em]">Ambra Flow</h2>
</div>
<!-- Main Card -->
<div class="bg-white dark:bg-[#1e150f] rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-[#f0ebe8] dark:border-[#3a2d25] p-8 sm:p-10 flex flex-col">
<div class="flex flex-col gap-4 text-center mb-8">
<div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center mx-auto text-primary mb-2">
<span class="material-symbols-outlined" style="font-size: 28px;">lock_reset</span>
</div>
<h1 class="text-[#181411] dark:text-white text-2xl font-extrabold leading-tight">
                            Recuperar Senha
                        </h1>
<p class="text-[#8a7460] dark:text-[#a89688] text-sm sm:text-base font-medium leading-relaxed">
                            Informe seu e-mail, CPF ou CNPJ cadastrado para receber as instruções de redefinição.
                        </p>
</div>
<!-- Recovery Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2">
<label class="text-[#181411] dark:text-white text-sm font-semibold leading-normal">
                                E-mail ou Documento
                            </label>
<div class="relative group/input">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[#8a7460] group-focus-within/input:text-primary transition-colors duration-200">badge</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#181411] dark:text-white focus:outline-0 focus:ring-0 border border-[#e6e0db] dark:border-[#3a2d25] bg-white dark:bg-[#261d16] focus:border-primary dark:focus:border-primary h-14 pl-12 pr-4 placeholder:text-[#8a7460]/70 text-base font-normal leading-normal transition-all shadow-sm" placeholder="Digite seu e-mail, CPF ou CNPJ" type="text"/>
</div>
</div>
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary hover:bg-[#d96600] active:scale-[0.98] transition-all duration-200 text-white shadow-lg shadow-primary/20 text-base font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Enviar Instruções</span>
<span class="material-symbols-outlined ml-2 text-sm font-bold">arrow_forward</span>
</button>
</form>
<!-- Back to Login -->
<div class="mt-8 pt-6 border-t border-[#f5f2f0] dark:border-[#3a2d25] flex justify-center">
<a class="inline-flex items-center justify-center gap-2 text-sm font-semibold text-[#8a7460] dark:text-[#a89688] hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                            Voltar ao Login
                        </a>
</div>
</div>
<!-- Footer Support -->
<p class="mt-8 text-center text-sm text-[#8a7460] dark:text-[#a89688]">
                    Dificuldade para acessar? <a class="font-bold text-primary hover:underline decoration-2 underline-offset-2" href="#">Fale com o suporte</a>
</p>
</div>
</div>
</div>
</body></html>
