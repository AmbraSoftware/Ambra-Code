name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      DATABASE_URL: 'postgresql://prisma:prisma@localhost:5432/nodum?schema=public'
      DIRECT_URL: 'postgresql://prisma:prisma@localhost:5432/nodum?schema=public'

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'

    - name: Enable Corepack (for Yarn modern)
      run: corepack enable

    - name: Install Yarn
      run: corepack prepare yarn@stable --activate

    # Install Root Dependencies (Yarn fully supports workspace:* protocol)
    - name: Install Dependencies
      run: yarn install --immutable

    - name: Generate Prisma Client (Backend)
      run: yarn workspace apps/backend prisma generate

    # Build Backend
    - name: Build Backend
      run: yarn workspace apps/backend build

    # Build Ambra Flow (Frontend)
    - name: Build Ambra Flow
      run: yarn workspace apps/ambra-flow build

    # Build Ambra Console (Frontend)
    - name: Build Ambra Console
      run: yarn workspace apps/ambra-console build

    # Run Linter
    # - name: Lint
    #   run: yarn lint

    # Run Tests
    - name: Test REST API (Backend)
      run: yarn workspace apps/backend test
