name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      DATABASE_URL: 'postgresql://prisma:prisma@localhost:5432/nodum?schema=public'

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        # cache disabled for clean install

    - name: Clean and install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install --workspaces

    - name: Generate Prisma Client (Backend)
      run: npx prisma generate --schema=apps/backend/prisma/schema.prisma

    # Build Backend
    - name: Build Backend
      run: npm --workspace apps/backend run build

    # Build Ambra Flow (Frontend)
    - name: Build Ambra Flow
      run: npm --workspace apps/ambra-flow run build

    # Build Ambra Console (Frontend)
    - name: Build Ambra Console
      run: npm --workspace apps/ambra-console run build

    # Build Ambra Food Web (Frontend)
    - name: Build Ambra Food Web
      run: npm --workspace apps/ambra-food-web run build

    # Run Tests
    - name: Test REST API (Backend)
      run: npm --workspace apps/backend test

  deploy-backend:
    name: Deploy Backend to Railway
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Railway CLI
      run: npm install -g @railway/cli
    
    - name: Deploy to Railway
      run: railway up --service backend
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    
    - name: Run Prisma Migrations
      run: |
        railway run --service backend "npx prisma migrate deploy --schema=apps/backend/prisma/schema.prisma"
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
