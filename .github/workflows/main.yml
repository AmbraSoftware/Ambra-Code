name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      DATABASE_URL: 'postgresql://prisma:prisma@localhost:5432/nodum?schema=public'

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies (allow native optional modules)
      run: |
        npm ci --unsafe-perm || npm install --unsafe-perm
        npm rebuild

    - name: Generate Prisma Client (Backend)
      run: npx prisma generate --schema=apps/backend/prisma/schema.prisma

    # Build Backend
    - name: Build Backend
      run: npm --workspace apps/backend run build

    # Build Ambra Flow (Frontend)
    - name: Build Ambra Flow
      run: npm --workspace apps/ambra-flow run build

    # Build Ambra Console (Frontend)
    - name: Build Ambra Console
      run: npm --workspace apps/ambra-console run build

    # Run Linter
    # - name: Lint
    #   run: yarn lint

    # Run Tests
    - name: Test REST API (Backend)
      run: npm --workspace apps/backend test
