name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      DATABASE_URL: 'postgresql://prisma:prisma@localhost:5432/nodum?schema=public'
      DIRECT_URL: 'postgresql://prisma:prisma@localhost:5432/nodum?schema=public'

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # Install Root Dependencies (Turbo/Nx/Monorepo aware if needed, currently assumes standard npm workspaces)
    - name: Install Dependencies
      run: npm ci --include=dev

    - name: Generate Prisma Client (Backend)
      run: npm exec --workspace=apps/backend prisma generate -- --schema prisma/schema.prisma

    # Build Backend
    - name: Build Backend
      run: npm run build --workspace=apps/backend

    # Build Ambra Flow (Frontend)
    - name: Build Ambra Flow
      run: npm run build --workspace=apps/ambra-flow

    # Build Ambra Console (Frontend)
    - name: Build Ambra Console
      run: npm run build --workspace=apps/ambra-console

    # Run Linter
    # - name: Lint
    #   run: npm run lint

    # Run Tests
    - name: Test REST API (Backend)
      run: npm test --workspace=apps/backend
