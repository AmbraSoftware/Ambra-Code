[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = ['npm ci']

[phases.build]
cmds = ['npx prisma generate --schema=apps/backend/prisma/schema.prisma', 'npm run build -w apps/backend']

[start]
cmd = 'npx prisma migrate deploy --schema=apps/backend/prisma/schema.prisma && node apps/backend/dist/main.js'
