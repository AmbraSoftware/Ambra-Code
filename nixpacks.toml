[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = ['npm ci']
# Disable automatic cache mounts that conflict with npm ci
cache = []

[phases.build]
cmds = ['npx prisma generate --schema=apps/backend/prisma/schema.prisma', 'npm run build -w apps/backend']
# Only cache Next.js build caches, not node_modules/.cache
cache = [
  '.temp_ag_kit/web/.next/cache',
  'apps/ambra-console/.next/cache',
  'apps/ambra-flow/.next/cache', 
  'apps/ambra-food-web/.next/cache'
]

[start]
cmd = 'npx prisma migrate deploy --schema=apps/backend/prisma/schema.prisma && node apps/backend/dist/main.js'
